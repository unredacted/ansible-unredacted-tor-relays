---
- name: Run the nusenu.relayor role and include custom vars
  remote_user: root
  become: True
  gather_facts: yes
  collections:
    - debops.debops
  hosts: "{{ target }}"
  vars_files:
    - vars/main.yml
  roles:
    - role: resolved
    - role: nusenu.relayor
  pre_tasks:
    - name: Disable Tailscale DNS
      command: tailscale up --login-server=https://funnel.unredacted.net --ssh --accept-dns=false

    # - set_fact:
    #     ansible_python_interpreter: "/usr/bin/python3"

    - name: Create system bootstrap script
      ansible.builtin.copy:
        dest: /usr/local/bin/system-bootstrap.sh
        mode: "0755"
        content: |
          #!/bin/bash

          IPT=/sbin/iptables
          IP6T=/sbin/ip6tables

          # Clamp TCP MSS to 1354 for IPv4 on output chain
          $IPT -t mangle -C OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1354 2>/dev/null || \
          $IPT -t mangle -A OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1354
          echo "IPv4 MSS clamp applied"

          # Clamp TCP MSS to 1334 for IPv4 on output chain
          $IP6T -t mangle -C OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1334 2>/dev/null || \
          $IP6T -t mangle -A OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1334
          echo "IPv6 MSS clamp applied"

    - name: Create systemd unit to apply system bootstrap script boot
      ansible.builtin.copy:
        dest: /etc/systemd/system/system-bootstrap.service
        content: |
          [Unit]
          Description=Apply system bootstrap script
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/system-bootstrap.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start system bootstrap systemd service
      ansible.builtin.systemd:
        name: system-bootstrap.service
        enabled: yes
        state: started

    - name: Copy all ZT configs in configs/zerotier -> /var/lib/zerotier-one/networks.d
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/var/lib/zerotier-one/networks.d/{{ item | basename }}"
        owner: zerotier-one
        group: zerotier-one
        mode: "0644"
      loop: "{{ query('ansible.builtin.fileglob', 'configs/zerotier/*.conf') }}"
      register: zt_config

    - name: Restart zerotier-one if configuration changed
      ansible.builtin.systemd:
        name: zerotier-one
        state: restarted
      when: zt_config.changed

    - name: Stop and disable Unbound before resolved takes over
      ansible.builtin.service:
        name: unbound
        state: stopped
        enabled: no
      failed_when: false

  post_tasks:
    - name: Remove Unbound if previously installed
      apt:
        name: unbound
        state: absent
        purge: yes

    - name: Ensure resolv.conf points to systemd-resolved stub
      ansible.builtin.file:
        path: /etc/resolv.conf
        src: /run/systemd/resolve/stub-resolv.conf
        state: link
        force: yes

